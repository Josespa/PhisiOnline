<div class="sidebar pe-4 pb-3">
  <nav class="navbar bg-light navbar-light">
      <a href="{{ url_for('home') }}" class="navbar-brand mx-4 mb-3">
          <h3 class="text-primary">PhysiOnline</h3>
      </a>
      <div class="d-flex align-items-center ms-4 mb-4">
          <div class="ms-3"> 
            
            <h6 class="mb-0">{{ welcome }} </h6>
            <span class="user">{{ session['username'] }}</span>
            
          </div>
      </div>
      <div class="navbar-nav w-100">
          <a href="{{ url_for('home') }}" class="nav-item nav-link {% if home %}active{% endif %}"><i class="fa fa-tachometer-alt me-2"></i>{{ dashboard }}</a>
          <a href="{{ url_for('listappointments') }}" class="nav-item nav-link {% if listappointments %}active{% endif %}"><i class="bi bi-calendar-event"></i>{{ appointments }}</a>
          <a href="{{ url_for('exercises') }}" class="nav-item nav-link {% if listexercices %}active{% endif %}"><i class="bi bi-journal-check"></i>{{ exercices }}</a>
          <a href="{{ url_for('listusers') }}" class="nav-item nav-link {% if listusers %}active{% endif %}"><i class="bi bi-people"></i>{{ users }}</a>
          <a href="#" class="nav-item nav-link"><i class="bi bi-gear"></i>{{ settings }}</a>
        </div>
  </nav>
</div>
