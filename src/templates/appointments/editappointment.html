<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>PhysiOnline</title>
    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap Stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- Template Stylesheet -->
    <!-- <link rel="stylesheet" href="static/css/main.css"/> -->
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    {% include "includes/side-bar.html" %}
    <!-- Content Start -->
    <div class="content">
        <!-- Navbar Start -->
        {% include "includes/top-bar.html" %}
        <!-- Navbar End -->
        <!-- Update appointment start -->
        <div class="container-fluid pt-4 px-4">
            <div class="row g-4">
                <div class="col-sm-12 col-xl-6">
                    <div class="card mb-3">
                        <form method=post enctype=multipart/form-data>
                            <div class="card-body">
                                <div class="row">
                                <div class="col-sm-3">
                                    <h6 class="mb-0">Name</h6>
                                </div>
                                <div class="col-sm-9 text-secondary">
                                    {{ user.first_name }} {{ user.last_name }}
                                </div>
                                </div>
                                <hr>
                                <div class="row">
                                <div class="col-sm-3">
                                    <h6 class="mb-0">Email</h6>
                                </div>
                                <div class="col-sm-9 text-secondary">
                                    {{ user.email }}
                                </div>
                                </div>
                                <hr>
                                <div class="row">
                                <div class="col-sm-3">
                                    <h6 class="mb-0">Primary language</h6>
                                </div>
                                <div class="col-sm-9 text-secondary">
                                    {{ language.title }}
                                </div>
                                </div>
                                <hr>
                                <div class="row">
                                <div class="col-sm-3">
                                    <h6 class="mb-0">Physio</h6>
                                </div>
                                <div class="col-sm-9 text-secondary">
                                    <select disabled="true" class="form-select mb-3" name="updateselect_physio" id="updateselect_physio" >
                                        <option value="{{appointment.physioid}}" selected>{{appointment.physioname}}</option>
                                        
                                    </select>
                                </div>
                                </div>
                                <hr>
                                <div class="row">
                                <div class="col-sm-3">
                                    <h6 class="mb-0">Date</h6>
                                </div>
                                <div class="col-sm-9 text-secondary">
                                    <input type="date" class="form-control" id="updateselect_date" name = "updateselect_date"/>
                                </div>
                                </div>
                                <hr>
                                <div class="row">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Time</h6>
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <select class="form-select mb-3" name="updateselect_time" id="updateselect_time" >
                                            <option value="" selected>Select Time</option>
                                            
                                        </select>
                                    </div>
                                    </div>
                                    <hr>
                                <div class="row">
                                <div class="col-sm-12">
                                    <button type="submit" class="btn btn-info " value = "submit">Book appointment</button>  
                                </div>
                                </div>
                            
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!--Update appointment End -->
        <!-- Footer Start -->
        {% include "includes/footer.html" %}
        <!-- Footer End -->
    </div>
    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <!-- <script src="static/js/main.js" type="module"></script> -->
    
    <script src="{{url_for('static', filename='js/main.js')}}" type="module"></script>
</body>
</html>
